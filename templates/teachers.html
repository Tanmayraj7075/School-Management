<!DOCTYPE html>
<html>
<head>
    <title>Teachers Management</title>
    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/teachers.css') }}">
</head>

<body>

    <h1>Teachers Management</h1>

    <form action="/add_teacher" method="POST">

        <input type="text" name="teacher_id" placeholder="Teacher ID" required>

        <input type="text" name="name" placeholder="Teacher Name" required>

        <input type="text" name="subject" placeholder="Subject" required>

        <input type="text" name="class" placeholder="Class" required>

        <input type="email" name="email" placeholder="Email" required>

        <button type="submit">Add Teacher</button>

    </form>

    <br><br>

    <table border="1">

        <tr>
            <th>ID</th>
            <th>Teacher ID</th>
            <th>Name</th>
            <th>Subject</th>
            <th>Class</th>
            <th>Email</th>
            <th>Action</th>
        </tr>

        {% for teacher in teachers %}

        <tr>
            <td>{{ teacher.id }}</td>
            <td>{{ teacher.teacher_id }}</td>
            <td>{{ teacher.name }}</td>
            <td>{{ teacher.subject_name }}</td>
            <td>{{ teacher.class_name }}</td>
            <td>{{ teacher.email }}</td>

            <td>
                <a href="/delete_teacher/{{ teacher.id }}"
                onclick="return confirmDelete();">
                Delete
                </a>
            </td>
        </tr>

        {% endfor %}

    </table>

    <br>

    <a href="/dashboard">Dashboard</a>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
