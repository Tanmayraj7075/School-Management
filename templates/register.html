<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/register.css') }}">
</head>
<body>

<h2>Student Registration in TMG Group 🧑‍🎓</h2>

<form action="/register_user" method="POST">

    <input
        type="text"
        name="fullname"
        placeholder="Full Name"
        required
    >

    <br><br>

    <input
        type="email"
        name="email"
        placeholder="Email"
        required
    >

    <br><br>

    <input
        type="text"
        name="phone"
        placeholder="Phone Number"
        required
    >

    <br><br>

    <input
        type="text"
        name="class"
        placeholder="Class"
        required
    >

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
