<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page - RT International Public School</title>
  <link rel="stylesheet"
  href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

  <h1>TMG International Public School</h1>
  <h2>Login</h2>

  <form action="/login_user" method="POST">

      <label>Email</label>
      <input
        type="email"
        name="email"
        placeholder="Enter Email"
        required
      >

      <br><br>

      <label>Password</label>
      <input
        type="password"
        name="password"
        placeholder="Enter Password"
        required
      >

      <br><br>

      <button type="submit">
        Login
      </button>

      <a href="/register">
          <button type="button">
              Register
          </button>
      </a>

  </form>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
